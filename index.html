<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Opslaan - De AI Strateeg</title>
    <style>
        :root {
            --c-background: #000000;
            --c-brand-dark: #1e1d3e;
            --c-primary: #b079b2;
            --c-text: #F5F5F7;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--c-background);
            color: var(--c-text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            overflow: hidden;
        }

        .loader {
            width: 48px;
            height: 48px;
            border: 3px solid rgba(176, 121, 178, 0.2);
            border-radius: 50%;
            display: inline-block;
            position: relative;
            box-sizing: border-box;
            animation: rotation 1s linear infinite;
            margin-bottom: 24px;
        }

        .loader::after {
            content: '';
            box-sizing: border-box;
            position: absolute;
            left: 0;
            top: 0;
            background: var(--c-primary);
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        @keyframes rotation {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        h1 {
            font-size: 20px;
            font-weight: 600;
            margin: 0 0 10px 0;
            letter-spacing: -0.02em;
        }

        p {
            font-size: 14px;
            color: #9898A0;
            margin: 0;
        }

        .bg-glow {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80vw;
            height: 80vw;
            background: radial-gradient(circle, rgba(30, 29, 62, 0.4) 0%, transparent 70%);
            filter: blur(80px);
            z-index: -1;
            pointer-events: none;
        }
    </style>
</head>

<body>
    <div class="bg-glow"></div>
    <div class="loader"></div>
    <h1>Contact opslaan...</h1>
    <p>Je contact wordt gedownload en WhatsApp wordt geopend.</p>

    <script>
        // Configuration
        const vcfPath = 'vcard.vcf';
        const whatsappPath = 'https://wa.me/31645968769';

        window.onload = function () {
            // 1. Open WhatsApp
            window.location.href = whatsappPath;

            // 2. Trigger VCard Download after a short delay (1.5s)
            // Note: Mobile browsers may behave differently, 
            // but this is the most reliable way to chain them.
            setTimeout(function () {
                const link = document.createElement('a');
                link.href = vcfPath;
                link.download = vcfPath;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            }, 1500);
        };
    </script>
</body>

</html>
